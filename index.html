<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOXYZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
    font-family: 'Share Tech Mono', monospace;
  }
  #title {
    position: absolute; top: 20px; left: 24px;
    font-family: 'Orbitron', monospace; font-weight: 900; font-size: 20px;
    letter-spacing: 8px; color: #fff;
    text-shadow: 0 0 20px rgba(100,200,255,0.4);
  }
  #crystals {
    position: absolute; top: 14px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
  }
  .crow { display: flex; align-items: center; gap: 9px; }
  .ccount { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; min-width: 30px; text-align: right; }
  .cicon { width: 14px; height: 14px; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }
  .g  { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  .gt { color: #00ff88; text-shadow: 0 0 6px #00ff88; }
  .y  { background: #ffd700; box-shadow: 0 0 8px #ffd700; }
  .yt { color: #ffd700; text-shadow: 0 0 6px #ffd700; }
  .p  { background: #bf5fff; box-shadow: 0 0 8px #bf5fff; }
  .pt { color: #bf5fff; text-shadow: 0 0 6px #bf5fff; }
  #minimap {
    position: absolute; bottom: 20px; right: 20px;
    width: 140px; height: 140px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">KNOXYZ</div>
  <div id="crystals">
    <div class="crow"><span class="ccount gt" id="cg">0</span><div class="cicon g"></div></div>
    <div class="crow"><span class="ccount yt" id="cy">0</span><div class="cicon y"></div></div>
    <div class="crow"><span class="ccount pt" id="cp">0</span><div class="cicon p"></div></div>
  </div>
  <canvas id="minimap"></canvas>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const mmc    = document.getElementById('minimap');
const mmx    = mmc.getContext('2d');
mmc.width = mmc.height = 140;

let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const TILE  = 48;
const CHUNK = 14;
const CS    = TILE * CHUNK;

const CCOLORS = { g:'#00ff88', y:'#ffd700', p:'#bf5fff' };

const chunks    = new Map();
const crystals  = [];
const particles = [];
const counts    = { g:0, y:0, p:0 };
const player    = { wx:0, wy:0, r:8, speed:3.4 };
let camX=0, camY=0;

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()]=true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()]=false; });

// ── World gen ──────────────────────────────────────────────────────────────
function chunkKey(cx,cy){ return cx+','+cy; }

function generateChunk(cx,cy){
  const tiles = new Uint8Array(CHUNK*CHUNK); // 0=wall 1=floor
  const rooms = [];
  const n = 4 + Math.floor(Math.random()*4);

  for(let i=0;i<n;i++){
    const rw = 3+Math.floor(Math.random()*4);
    const rh = 3+Math.floor(Math.random()*4);
    const rx = 1+Math.floor(Math.random()*(CHUNK-rw-2));
    const ry = 1+Math.floor(Math.random()*(CHUNK-rh-2));
    rooms.push({ cx:rx+Math.floor(rw/2), cy:ry+Math.floor(rh/2) });
    for(let ty=ry;ty<ry+rh;ty++)
      for(let tx=rx;tx<rx+rw;tx++)
        tiles[ty*CHUNK+tx]=1;
  }

  // L-corridors between rooms
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1], b=rooms[i];
    const x0=Math.min(a.cx,b.cx), x1=Math.max(a.cx,b.cx);
    for(let x=x0;x<=x1;x++)
      for(let w=-1;w<=1;w++){ const ty=a.cy+w; if(ty>=0&&ty<CHUNK) tiles[ty*CHUNK+x]=1; }
    const y0=Math.min(a.cy,b.cy), y1=Math.max(a.cy,b.cy);
    for(let y=y0;y<=y1;y++)
      for(let w=-1;w<=1;w++){ const tx=b.cx+w; if(tx>=0&&tx<CHUNK) tiles[y*CHUNK+tx]=1; }
  }

  // open 3-wide passage at centre of each edge
  const mid=Math.floor(CHUNK/2);
  for(let d=mid-1;d<=mid+1;d++){
    for(let t=0;t<3;t++){
      tiles[t*CHUNK+d]=1;
      tiles[(CHUNK-1-t)*CHUNK+d]=1;
      tiles[d*CHUNK+t]=1;
      tiles[d*CHUNK+(CHUNK-1-t)]=1;
    }
  }

  // scatter crystals
  const floor=[];
  for(let i=0;i<CHUNK*CHUNK;i++) if(tiles[i]===1) floor.push(i);
  const nc=3+Math.floor(Math.random()*4);
  const types=['g','y','p'];
  const cc=[];
  for(const idx of floor.sort(()=>Math.random()-.5).slice(0,nc)){
    cc.push({
      wx: cx*CS+(idx%CHUNK)*TILE+TILE/2,
      wy: cy*CS+Math.floor(idx/CHUNK)*TILE+TILE/2,
      type: types[Math.floor(Math.random()*3)],
      r:6, collected:false
    });
  }

  const data={tiles,crystals:cc};
  chunks.set(chunkKey(cx,cy),data);
  crystals.push(...cc);
  return data;
}

function getChunk(cx,cy){
  const k=chunkKey(cx,cy);
  if(!chunks.has(k)) generateChunk(cx,cy);
  return chunks.get(k);
}

// tileAtWorld — looks up the correct chunk, no clamping artefacts
function tileAtWorld(wx,wy){
  const cx=Math.floor(wx/CS), cy=Math.floor(wy/CS);
  const d=getChunk(cx,cy);
  const tx=Math.max(0,Math.min(CHUNK-1,Math.floor((wx-cx*CS)/TILE)));
  const ty=Math.max(0,Math.min(CHUNK-1,Math.floor((wy-cy*CS)/TILE)));
  return d.tiles[ty*CHUNK+tx];
}

// neighbour-aware tile lookup for wall edge detection
function tileNeighbour(chunkData,cx,cy,tx,ty){
  if(tx<0)      return getChunk(cx-1,cy).tiles[ty*CHUNK+(CHUNK-1)];
  if(tx>=CHUNK) return getChunk(cx+1,cy).tiles[ty*CHUNK+0];
  if(ty<0)      return getChunk(cx,cy-1).tiles[(CHUNK-1)*CHUNK+tx];
  if(ty>=CHUNK) return getChunk(cx,cy+1).tiles[0*CHUNK+tx];
  return chunkData.tiles[ty*CHUNK+tx];
}

// ── Movement ───────────────────────────────────────────────────────────────
function tryMove(dx,dy){
  const r=player.r-1;
  const nx=player.wx+dx, ny=player.wy+dy;
  if( tileAtWorld(nx+r,player.wy-r) && tileAtWorld(nx+r,player.wy+r) &&
      tileAtWorld(nx-r,player.wy-r) && tileAtWorld(nx-r,player.wy+r) )
    player.wx=nx;
  if( tileAtWorld(player.wx+r,ny-r) && tileAtWorld(player.wx+r,ny+r) &&
      tileAtWorld(player.wx-r,ny-r) && tileAtWorld(player.wx-r,ny+r) )
    player.wy=ny;
}

function updateCamera(){
  camX+=(player.wx-W/2-camX)*0.1;
  camY+=(player.wy-H/2-camY)*0.1;
}

function getVisible(){
  const list=[];
  const x0=Math.floor(camX/CS)-1, y0=Math.floor(camY/CS)-1;
  const x1=Math.floor((camX+W)/CS)+1, y1=Math.floor((camY+H)/CS)+1;
  for(let cy=y0;cy<=y1;cy++)
    for(let cx=x0;cx<=x1;cx++)
      list.push({cx,cy,data:getChunk(cx,cy)});
  return list;
}

// ── Wall renderer ──────────────────────────────────────────────────────────
// Traces floor↔wall edges across chunk boundaries using neighbour lookup.
// Two passes: wide soft glow + narrow bright core.
function buildWallPath(vis){
  ctx.beginPath();
  for(const {cx,cy,data} of vis){
    const {tiles}=data;
    const ox=cx*CS-camX, oy=cy*CS-camY;
    for(let ty=0;ty<CHUNK;ty++){
      for(let tx=0;tx<CHUNK;tx++){
        if(tiles[ty*CHUNK+tx]!==1) continue;
        const sx=ox+tx*TILE, sy=oy+ty*TILE;
        if(tileNeighbour(data,cx,cy,tx,ty-1)===0){ ctx.moveTo(sx,sy);       ctx.lineTo(sx+TILE,sy);       }
        if(tileNeighbour(data,cx,cy,tx,ty+1)===0){ ctx.moveTo(sx,sy+TILE);  ctx.lineTo(sx+TILE,sy+TILE);  }
        if(tileNeighbour(data,cx,cy,tx-1,ty)===0){ ctx.moveTo(sx,sy);       ctx.lineTo(sx,sy+TILE);       }
        if(tileNeighbour(data,cx,cy,tx+1,ty)===0){ ctx.moveTo(sx+TILE,sy);  ctx.lineTo(sx+TILE,sy+TILE);  }
      }
    }
  }
}

function drawWalls(vis){
  ctx.save();

  // pass 1 — soft wide glow
  buildWallPath(vis);
  ctx.lineWidth=10;
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.shadowColor='#ffffff';
  ctx.shadowBlur=20;
  ctx.stroke();

  // pass 2 — crisp bright line
  buildWallPath(vis);
  ctx.lineWidth=2;
  ctx.strokeStyle='#ffffff';
  ctx.shadowColor='rgba(200,230,255,0.8)';
  ctx.shadowBlur=6;
  ctx.stroke();

  ctx.restore();
}

// ── Crystals ───────────────────────────────────────────────────────────────
function drawCrystals(){
  for(const c of crystals){
    if(c.collected) continue;
    const sx=c.wx-camX, sy=c.wy-camY;
    if(sx<-40||sx>W+40||sy<-40||sy>H+40) continue;
    const col=CCOLORS[c.type];
    const r=c.r;
    ctx.save();
    ctx.translate(sx,sy);
    ctx.beginPath();
    ctx.moveTo(0,-r); ctx.lineTo(r*0.6,0); ctx.lineTo(0,r); ctx.lineTo(-r*0.6,0);
    ctx.closePath();
    ctx.fillStyle=col;
    ctx.shadowColor=col;
    ctx.shadowBlur=8;
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ── Player ─────────────────────────────────────────────────────────────────
function drawPlayer(){
  const sx=player.wx-camX, sy=player.wy-camY;
  ctx.beginPath();
  ctx.arc(sx,sy,player.r,0,Math.PI*2);
  ctx.fillStyle='#64c8ff';
  ctx.shadowColor='#64c8ff';
  ctx.shadowBlur=6;
  ctx.fill();
  ctx.shadowBlur=0;
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(wx,wy,col){
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, sp=0.8+Math.random()*3;
    particles.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:col,life:1,r:2+Math.random()*2});
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.9; p.vy*=0.9; p.life-=0.04;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.beginPath();
    ctx.arc(p.x-camX,p.y-camY,p.r*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life*0.8; ctx.fill(); ctx.globalAlpha=1;
  }
}

// ── Crystal pickup ─────────────────────────────────────────────────────────
function checkCrystals(){
  for(const c of crystals){
    if(c.collected) continue;
    const dx=c.wx-player.wx, dy=c.wy-player.wy;
    if(dx*dx+dy*dy<(player.r+c.r+10)**2){
      c.collected=true; counts[c.type]++;
      spawnParticles(c.wx,c.wy,CCOLORS[c.type]);
      document.getElementById('c'+c.type).textContent=counts[c.type];
    }
  }
}

// ── Minimap ────────────────────────────────────────────────────────────────
function drawMinimap(vis){
  const MW=mmc.width, MH=mmc.height;
  mmx.clearRect(0,0,MW,MH);
  mmx.fillStyle='#000'; mmx.fillRect(0,0,MW,MH);

  const scale=2.2;
  const offX=MW/2-(player.wx/TILE)*scale;
  const offY=MH/2-(player.wy/TILE)*scale;

  for(const {cx,cy,data} of vis){
    const {tiles}=data;
    for(let ty=0;ty<CHUNK;ty++) for(let tx=0;tx<CHUNK;tx++){
      if(!tiles[ty*CHUNK+tx]) continue;
      mmx.fillStyle='rgba(255,255,255,0.13)';
      mmx.fillRect((cx*CHUNK+tx)*scale+offX,(cy*CHUNK+ty)*scale+offY,scale,scale);
    }
  }

  for(const c of crystals){
    if(c.collected) continue;
    const px=(c.wx/TILE)*scale+offX, py=(c.wy/TILE)*scale+offY;
    if(px<0||px>MW||py<0||py>MH) continue;
    mmx.beginPath(); mmx.arc(px,py,1.8,0,Math.PI*2);
    mmx.fillStyle=CCOLORS[c.type]; mmx.fill();
  }

  mmx.beginPath(); mmx.arc(MW/2,MH/2,3,0,Math.PI*2);
  mmx.fillStyle='#64c8ff';
  mmx.shadowColor='#64c8ff'; mmx.shadowBlur=4; mmx.fill(); mmx.shadowBlur=0;
}

// ── Init ───────────────────────────────────────────────────────────────────
for(let cy=-1;cy<=1;cy++) for(let cx=-1;cx<=1;cx++) getChunk(cx,cy);

const sc=chunks.get('0,0');
outer: for(let ty=CHUNK/2-4;ty<=CHUNK/2+4;ty++){
  for(let tx=CHUNK/2-4;tx<=CHUNK/2+4;tx++){
    if(sc.tiles[ty*CHUNK+tx]===1){
      player.wx=tx*TILE+TILE/2; player.wy=ty*TILE+TILE/2; break outer;
    }
  }
}
camX=player.wx-W/2; camY=player.wy-H/2;

// ── Loop ───────────────────────────────────────────────────────────────────
function loop(t){
  const sp=player.speed;
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])    dy-=sp;
  if(keys['s']||keys['arrowdown'])  dy+=sp;
  if(keys['a']||keys['arrowleft'])  dx-=sp;
  if(keys['d']||keys['arrowright']) dx+=sp;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  if(dx||dy) tryMove(dx,dy);
  updateCamera();

  ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H);

  const vis=getVisible();
  drawWalls(vis);
  drawCrystals();
  updateParticles();
  drawPlayer();
  checkCrystals();
  drawMinimap(vis);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
