<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOXYZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: #fff;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
  }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #title {
    position: absolute;
    top: 22px; left: 28px;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 8px;
    color: #fff;
    text-shadow: 0 0 12px rgba(255,255,255,0.4), 0 0 30px rgba(100,200,255,0.15);
  }

  #crystals {
    position: absolute;
    top: 16px; right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: flex-end;
  }

  .crystal-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .crystal-count {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    min-width: 32px;
    text-align: right;
  }

  .crystal-icon {
    width: 18px;
    height: 18px;
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  }

  .green { background: #00ff88; box-shadow: 0 0 12px #00ff88, 0 0 24px rgba(0,255,136,0.4); }
  .green-text { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
  .yellow { background: #ffd700; box-shadow: 0 0 12px #ffd700, 0 0 24px rgba(255,215,0,0.4); }
  .yellow-text { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
  .purple { background: #bf5fff; box-shadow: 0 0 12px #bf5fff, 0 0 24px rgba(191,95,255,0.4); }
  .purple-text { color: #bf5fff; text-shadow: 0 0 10px #bf5fff; }

  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10,10,10,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: all;
  }

  #overlay h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(42px, 8vw, 80px);
    letter-spacing: 12px;
    color: #fff;
    text-shadow: 0 0 20px rgba(100,200,255,0.5), 0 0 60px rgba(100,200,255,0.2);
    margin-bottom: 8px;
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 20px rgba(100,200,255,0.5), 0 0 60px rgba(100,200,255,0.2); }
    50% { text-shadow: 0 0 30px rgba(100,200,255,0.8), 0 0 80px rgba(100,200,255,0.4), 0 0 120px rgba(100,200,255,0.1); }
  }

  #overlay .subtitle {
    font-size: 11px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 52px;
    text-transform: uppercase;
  }

  #gameover-text {
    display: none;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 5px;
    color: rgba(255,80,80,0.9);
    text-shadow: 0 0 15px rgba(255,80,80,0.5);
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  #last-score {
    display: none;
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 40px;
  }

  #start-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 5px;
    padding: 14px 40px;
    cursor: pointer;
    pointer-events: all;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(100,200,255,0.05);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
  }

  #start-btn:hover::before { transform: translateX(0); }
  #start-btn:hover {
    border-color: rgba(100,200,255,0.6);
    color: rgba(100,200,255,1);
    text-shadow: 0 0 15px rgba(100,200,255,0.6);
    box-shadow: 0 0 20px rgba(100,200,255,0.15);
  }

  .controls-hint {
    margin-top: 40px;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    line-height: 2;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="title">KNOXYZ</div>
  <div id="crystals">
    <div class="crystal-row">
      <span class="crystal-count green-text" id="cnt-g">0</span>
      <div class="crystal-icon green"></div>
    </div>
    <div class="crystal-row">
      <span class="crystal-count yellow-text" id="cnt-y">0</span>
      <div class="crystal-icon yellow"></div>
    </div>
    <div class="crystal-row">
      <span class="crystal-count purple-text" id="cnt-p">0</span>
      <div class="crystal-icon purple"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <h1>KNOXYZ</h1>
  <div class="subtitle">Infinite Corridor Runner</div>
  <div id="gameover-text">— COLLISION DETECTED —</div>
  <div id="last-score" id="last-score"></div>
  <button id="start-btn">INITIALISE</button>
  <div class="controls-hint">
    W · A · S · D — MOVE<br>
    AVOID WALLS · COLLECT CRYSTALS
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ──────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

let gameRunning = false;
let player, gameSpeed, scrollOffset, chunks, crystals, counts, particles;

const CHUNK_W = 400;
const CORRIDOR_H = 180;
const WALL_THICK = 28;
const PLAYER_R = 9;

function initGame() {
  player = { x: 160, y: H / 2, vx: 0, vy: 0 };
  gameSpeed = 2.2;
  scrollOffset = 0;
  counts = { g: 0, y: 0, p: 0 };
  chunks = [];
  crystals = [];
  particles = [];
  updateUI();

  // seed initial chunks
  for (let i = 0; i < Math.ceil(W / CHUNK_W) + 3; i++) {
    spawnChunk(i * CHUNK_W);
  }
}

// ── Chunk / wall generation ────────────────────────────────────────────────
let chunkX = 0;
function spawnChunk(startX) {
  const cy = H / 2 + Math.sin(startX * 0.003) * (H * 0.18);
  chunks.push({ startX, cy });
  chunkX = startX + CHUNK_W;

  // spawn 1-2 crystals per chunk
  const n = Math.random() < 0.5 ? 1 : 2;
  const types = ['g', 'y', 'p'];
  for (let i = 0; i < n; i++) {
    const t = types[Math.floor(Math.random() * 3)];
    const ox = startX + 80 + Math.random() * (CHUNK_W - 160);
    const spread = CORRIDOR_H / 2 - 28;
    const oy = cy + (Math.random() * 2 - 1) * spread;
    crystals.push({ x: ox, type: t, y: oy, r: 10, collected: false, phase: Math.random() * Math.PI * 2 });
  }
}

// ── Render helpers ─────────────────────────────────────────────────────────
function corridorCY(worldX) {
  return H / 2 + Math.sin(worldX * 0.003) * (H * 0.18);
}

function drawWalls() {
  // gradient wall effect
  const gradient = ctx.createLinearGradient(0, 0, 0, H);

  // draw top & bottom wall segments per chunk
  for (const ch of chunks) {
    const sx = ch.startX - scrollOffset;
    if (sx > W + 20 || sx + CHUNK_W < -20) continue;

    for (let px = sx; px < sx + CHUNK_W; px += 2) {
      const worldX = px + scrollOffset;
      const cy = corridorCY(worldX);
      const topY = cy - CORRIDOR_H / 2;
      const botY = cy + CORRIDOR_H / 2;

      // top wall
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(px, topY - WALL_THICK, 2, WALL_THICK);

      // bottom wall
      ctx.fillRect(px, botY, 2, WALL_THICK);
    }
  }
}

function wallGlow() {
  for (const ch of chunks) {
    const sx = ch.startX - scrollOffset;
    if (sx > W + 20 || sx + CHUNK_W < -20) continue;

    for (let px = sx; px < sx + CHUNK_W; px += 8) {
      const worldX = px + scrollOffset;
      const cy = corridorCY(worldX);
      const topY = cy - CORRIDOR_H / 2;
      const botY = cy + CORRIDOR_H / 2;

      // top glow dot
      ctx.beginPath();
      ctx.arc(px, topY, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(180,230,255,0.55)';
      ctx.fill();

      ctx.beginPath();
      ctx.arc(px, botY, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function crystalColor(type) {
  return { g: '#00ff88', y: '#ffd700', p: '#bf5fff' }[type];
}
function crystalShadow(type) {
  return { g: 'rgba(0,255,136,', y: 'rgba(255,215,0,', p: 'rgba(191,95,255,' }[type];
}

function drawCrystals(t) {
  for (const c of crystals) {
    if (c.collected) continue;
    const sx = c.x - scrollOffset;
    if (sx < -30 || sx > W + 30) continue;

    const bob = Math.sin(t * 0.002 + c.phase) * 3;
    const col = crystalColor(c.type);
    const shad = crystalShadow(c.type);

    ctx.save();
    ctx.translate(sx, c.y + bob);
    ctx.rotate(t * 0.001 + c.phase);

    // glow
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, c.r * 3);
    grd.addColorStop(0, shad + '0.5)');
    grd.addColorStop(1, shad + '0)');
    ctx.beginPath();
    ctx.arc(0, 0, c.r * 3, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // pentagon shape
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(a) * c.r;
      const y = Math.sin(a) * c.r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;

  // outer glow
  const grd = ctx.createRadialGradient(px, py, 0, px, py, PLAYER_R * 5);
  grd.addColorStop(0, 'rgba(80,180,255,0.35)');
  grd.addColorStop(1, 'rgba(80,180,255,0)');
  ctx.beginPath();
  ctx.arc(px, py, PLAYER_R * 5, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // core
  ctx.beginPath();
  ctx.arc(px, py, PLAYER_R, 0, Math.PI * 2);
  ctx.fillStyle = '#64c8ff';
  ctx.shadowColor = '#64c8ff';
  ctx.shadowBlur = 24;
  ctx.fill();
  ctx.shadowBlur = 0;

  // inner bright
  ctx.beginPath();
  ctx.arc(px - 2, py - 2, PLAYER_R * 0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fill();
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      color,
      life: 1,
      r: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.92;
    p.vy *= 0.92;
    p.life -= 0.035;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life * 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── Collision ──────────────────────────────────────────────────────────────
function checkWallCollision() {
  const worldX = player.x + scrollOffset;
  const cy = corridorCY(worldX);
  const topWallBot = cy - CORRIDOR_H / 2;
  const botWallTop = cy + CORRIDOR_H / 2;

  if (player.y - PLAYER_R < topWallBot || player.y + PLAYER_R > botWallTop) {
    return true;
  }
  return false;
}

function checkCrystals() {
  for (const c of crystals) {
    if (c.collected) continue;
    const sx = c.x - scrollOffset;
    const dx = sx - player.x;
    const dy = c.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < PLAYER_R + c.r + 4) {
      c.collected = true;
      counts[c.type]++;
      spawnParticle(player.x, player.y, crystalColor(c.type));
      updateUI();
    }
  }
}

function updateUI() {
  document.getElementById('cnt-g').textContent = counts.g;
  document.getElementById('cnt-y').textContent = counts.y;
  document.getElementById('cnt-p').textContent = counts.p;
}

// ── Game loop ──────────────────────────────────────────────────────────────
let lastTime = 0;
function loop(t) {
  if (!gameRunning) return;
  const dt = Math.min(t - lastTime, 50);
  lastTime = t;

  // clear
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // scroll
  scrollOffset += gameSpeed;
  gameSpeed += 0.0008; // gentle acceleration

  // chunk management
  const lastChunk = chunks[chunks.length - 1];
  if (lastChunk && lastChunk.startX - scrollOffset < W + CHUNK_W) {
    spawnChunk(lastChunk.startX + CHUNK_W);
  }
  // cull far-left chunks
  while (chunks.length && chunks[0].startX + CHUNK_W < scrollOffset - 100) {
    chunks.shift();
  }
  while (crystals.length && crystals[0].x < scrollOffset - 100) {
    crystals.shift();
  }

  // draw background scanlines
  ctx.fillStyle = 'rgba(255,255,255,0.012)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }

  // walls
  drawWalls();
  wallGlow();

  // player input
  const spd = 3.2;
  if (keys['w'] || keys['arrowup'])    player.y -= spd;
  if (keys['s'] || keys['arrowdown'])  player.y += spd;
  if (keys['a'] || keys['arrowleft'])  player.x -= spd * 0.6;
  if (keys['d'] || keys['arrowright']) player.x += spd * 0.6;

  // clamp to screen
  player.x = Math.max(PLAYER_R + 2, Math.min(W - PLAYER_R - 2, player.x));
  player.y = Math.max(PLAYER_R + 2, Math.min(H - PLAYER_R - 2, player.y));

  // draw
  drawCrystals(t);
  updateParticles();
  drawPlayer();

  // check crystals
  checkCrystals();

  // wall collision
  if (checkWallCollision()) {
    endGame();
    return;
  }

  requestAnimationFrame(loop);
}

function startGame() {
  initGame();
  gameRunning = true;
  document.getElementById('overlay').style.display = 'none';
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('gameover-text').style.display = 'block';
  const scoreEl = document.getElementById('last-score');
  scoreEl.style.display = 'block';
  const total = counts.g + counts.y + counts.p;
  scoreEl.textContent = `CRYSTALS: ${counts.g} · ${counts.y} · ${counts.p}  ·  TOTAL ${total}`;
  document.getElementById('start-btn').textContent = 'RESTART';
  document.querySelector('.subtitle').textContent = '';
}

document.getElementById('start-btn').addEventListener('click', startGame);

// initial draw
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
